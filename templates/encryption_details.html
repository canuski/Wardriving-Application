<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Wardriving Data</title>
        <link
          rel="stylesheet"
          href="{{ url_for('static', filename='styles.css') }}"
        />
        <link
          href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
          rel="stylesheet"
        />
      </head>
<body>
    <h1>Encryption Methods</h1>

    <!-- Display the pie chart for encryption methods -->
    <section>
        <h2>Encryption Protocols</h2>
        <iframe
          src="{{ url_for('static', filename='encryption.html') }}"
          width="100%"
          height="600"
        ></iframe>
      </section>

    <h2>Explanation of Encryption Protocols</h2>
    <ul>
        {% for method, description in encryption_info.items() %}
            <li><strong>{{ method }}:</strong> {{ description }}</li>
        {% endfor %}
    </ul>

    <a href="/">Back to Home</a>
</body>
</html>
